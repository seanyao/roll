name: CI v3

# v3 branch CI — TypeScript workspace suites only. The bats suite is
# deliberately excluded here: its AGENTS.md content-contract tests are
# whitelisted-red on this branch (P1 rewrote the branch self-description;
# owner ruling 2026-06-05: leave tests/ untouched until porting completes,
# then update or retire them).
on:
  push:
    branches: [v3]
  pull_request:
    branches: [v3]

jobs:
  test-ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - run: pnpm -r test
