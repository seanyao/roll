name: CI

on:
  push:
    branches: [main]
    # US-POS-006: removed `paths-ignore: **.md / docs/**`. After the
    # `.roll/`-to-roll-meta migration the public repo's markdown surface is
    # small (README, install/use guides, AGENTS.md, skill SKILL.md files);
    # any change to those is meaningful and must run CI — earlier we ignored
    # them blindly and broken doc references shipped to main unnoticed.
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    if: "!startsWith(github.event.head_commit.message, '[release]')"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite: [unit, integration]
    name: test-${{ matrix.suite }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install GNU parallel
        run: sudo apt-get install -y parallel

      - name: Bootstrap ~/.roll and ~/.claude/skills (sync skills for tests that check installed locations)
        run: bash bin/roll setup

      - name: Run bats tests (${{ matrix.suite }})
        # US-QA-007: --tier=all runs every test regardless of fast/slow
        # classification. TCR / pre-push hooks default to --tier=fast.
        run: bash tests/run.sh --tier=all tests/${{ matrix.suite }}
