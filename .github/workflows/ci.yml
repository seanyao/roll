name: CI

on:
  push:
    branches: [main]
    # The public repo's markdown surface is small (README, install/use guides,
    # AGENTS.md, skill SKILL.md files); any change to those is meaningful and
    # must run CI, so there is deliberately no `paths-ignore` here.
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # The required gate: the TypeScript workspace suites. `main` is the v3 engine.
  test-ts:
    if: "!startsWith(github.event.head_commit.message, '[release]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      # No `version:` — pnpm/action-setup reads `packageManager` from package.json.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - run: pnpm test:e2e
      # FIX-340 — story-id uniqueness guard. A no-op in the public repo (the
      # `.roll/features` corpus lives in the roll-meta repo, absent here → exit
      # 0), but it runs in any checkout that DOES carry the data and reds on a
      # duplicate id; the logic itself is proven by the workspace unit tests.
      - run: node scripts/lint-story-ids.mjs
      - run: pnpm -r test
