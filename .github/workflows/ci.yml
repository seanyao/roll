name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'

jobs:
  test:
    if: "!startsWith(github.event.head_commit.message, '[release]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install GNU parallel
        run: sudo apt-get install -y parallel

      - name: Bootstrap ~/.roll and ~/.claude/skills (sync skills for tests that check installed locations)
        run: bash bin/roll setup

      - name: Run bats tests
        run: npm test
