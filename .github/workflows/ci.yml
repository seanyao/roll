name: CI

on:
  push:
    branches: [main]
    # The public repo's markdown surface is small (README, install/use guides,
    # AGENTS.md, skill SKILL.md files); any change to those is meaningful and
    # must run CI, so there is deliberately no `paths-ignore` here.
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # The required gate: the TypeScript workspace suites. `main` is the v3 engine.
  test-ts:
    if: "!startsWith(github.event.head_commit.message, '[release]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      # No `version:` — pnpm/action-setup reads `packageManager` from package.json.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - run: pnpm -r test

  # Non-blocking: the frozen bash suite. bats retires gradually — its AGENTS.md
  # content-contract tests are known-red after the v3 self-description rewrite,
  # so this job reports but never fails the build (`continue-on-error`).
  test-bats-legacy:
    if: "!startsWith(github.event.head_commit.message, '[release]')"
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        suite: [unit, integration]
    name: test-bats-legacy-${{ matrix.suite }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install GNU parallel
        run: sudo apt-get install -y parallel

      - name: Bootstrap ~/.roll and ~/.claude/skills (sync skills for tests that check installed locations)
        run: bash bin/roll setup

      - name: Run bats tests (${{ matrix.suite }})
        # --tier=all runs every test regardless of fast/slow classification.
        run: bash tests/run.sh --tier=all tests/${{ matrix.suite }}
