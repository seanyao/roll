name: Claude Code Review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: |
            Review PR ${{ github.repository }}/pull/${{ github.event.inputs.pr_number }}
            using /code-review:code-review.

            After review, decide ONE of:

            - APPROVE — code is acceptable. Run:
              gh pr review ${{ github.event.inputs.pr_number }} --approve --body "<summary>"

            - REQUEST_CHANGES — concrete issues found. Run:
              gh pr review ${{ github.event.inputs.pr_number }} --request-changes --body "<issue list>"

            - UNCERTAIN — not confident. Post a comment summarising concerns.
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
