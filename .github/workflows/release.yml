name: Create GitHub Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract changelog notes
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Prefer release_notes.txt committed by release.sh (Section 7 grouped format).
          # Fall back to awk-extracting the raw CHANGELOG.md section if not present.
          if [ ! -s release_notes.txt ]; then
            awk "/^## ${TAG}/{found=1; next} found && /^## /{exit} found && NF{print}" \
              CHANGELOG.md > release_notes.txt || true
          fi
          if [ ! -s release_notes.txt ]; then
            echo "Release ${TAG}" > release_notes.txt
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file release_notes.txt
