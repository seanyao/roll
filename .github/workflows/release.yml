name: Create GitHub Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog notes
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          # Convert v2026.510.5 → 2026.05.10 to match CHANGELOG date headers
          YEAR=$(echo "$VERSION" | cut -d. -f1)
          MMDD=$(echo "$VERSION" | cut -d. -f2)
          if [ ${#MMDD} -eq 3 ]; then
            MONTH=$(echo "$MMDD" | cut -c1)
            DAY=$(echo "$MMDD" | cut -c2-3)
          else
            MONTH=$(echo "$MMDD" | cut -c1-2)
            DAY=$(echo "$MMDD" | cut -c3-4)
          fi
          DATE_KEY="${YEAR}.$(printf '%02d' "$MONTH").${DAY}"
          NOTES=$(awk "/^## ${DATE_KEY}/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release ${TAG}"
          fi
          echo "$NOTES" > release_notes.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file release_notes.txt
