name: Create GitHub Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # US-CONSIST-005 — the release gate: any consistency dimension out of line
  # ABORTS the release before anything is published, with the gap list in the
  # job log. `roll release --gate-check` exits 0 only when every dimension passes.
  consistency-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - name: Consistency gate (blocks the release on any gap)
        run: node packages/cli/bin/roll.js release --gate-check

  release:
    needs: consistency-gate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract changelog notes
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Prefer release_notes.txt committed by release.sh (Section 7 grouped format).
          # Fall back to awk-extracting the raw CHANGELOG.md section if not present.
          NOTES_FALLBACK=0
          if [ ! -s release_notes.txt ]; then
            awk "/^## ${TAG}/{found=1; next} found && /^## /{exit} found && NF{print}" \
              CHANGELOG.md > release_notes.txt || true
          fi
          if [ ! -s release_notes.txt ]; then
            echo "Release ${TAG}" > release_notes.txt
            NOTES_FALLBACK=1
          fi
          echo "fallback=${NOTES_FALLBACK}" >> "$GITHUB_OUTPUT"

      - name: Create or merge same-day GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Same-day prefix: v2026.517.5 -> v2026.517
          DAY_PREFIX="${TAG%.*}"

          # Find existing releases for today (excluding the just-pushed tag, in case
          # the workflow somehow re-ran on an existing tag).
          EXISTING=$(gh release list --limit 50 \
            --json tagName --jq ".[].tagName | select(startswith(\"${DAY_PREFIX}.\")) | select(. != \"${TAG}\")")

          NEW_NOTES=$(cat release_notes.txt)
          MERGED=$(mktemp)
          printf '## %s\n\n%s\n' "$TAG" "$NEW_NOTES" > "$MERGED"

          # Skip same-day merge if our notes are just the "Release ${TAG}" fallback.
          # Merging an empty/fallback body with prior releases produces the snowball
          # effect where each new release accumulates every earlier same-day body.
          if [ "${{ steps.notes.outputs.fallback }}" = "1" ]; then
            EXISTING=""
            echo "⚠️  release_notes.txt is fallback-only; skipping same-day merge to avoid body snowball." >&2
          fi

          if [ -n "$EXISTING" ]; then
            # Pick the latest same-day release (highest N) as the source of prior notes.
            PREV_TAG=$(echo "$EXISTING" | sort -t. -k3 -n | tail -1)
            PREV_NOTES=$(gh release view "$PREV_TAG" --json body --jq .body)
            printf '## %s\n\n%s\n\n%s\n' "$TAG" "$NEW_NOTES" "$PREV_NOTES" > "$MERGED"

            # Delete all same-day prior releases (keep their git tags intact).
            echo "$EXISTING" | while read -r old; do
              [ -n "$old" ] && gh release delete "$old" --yes
            done
          fi

          mv "$MERGED" release_notes.txt
          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes-file release_notes.txt
