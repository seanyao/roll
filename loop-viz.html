<title>Roll Loop — 运行机制</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #06091a;
  color: #c8d8f0;
  font-family: -apple-system, 'Helvetica Neue', 'Segoe UI', sans-serif;
  min-height: 100vh;
  padding: 28px 36px 40px;
}

h1 {
  font-size: 1.45rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  background: linear-gradient(120deg, #60a5fa 0%, #a78bfa 55%, #f472b6 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 5px;
}

.subtitle {
  color: #3a5070;
  font-size: 0.82rem;
  margin-bottom: 22px;
}

/* ── Scenario bar ── */
.scenario-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 18px;
  flex-wrap: wrap;
  align-items: center;
}

.btn {
  padding: 7px 16px;
  border-radius: 8px;
  border: 1px solid #18253d;
  background: #0b1225;
  color: #4a6880;
  cursor: pointer;
  font-size: 0.79rem;
  font-family: inherit;
  transition: all 0.18s ease;
  user-select: none;
}
.btn:hover { border-color: #2a4a7a; color: #80a8d0; }
.btn.active {
  border-color: #3b82f6;
  color: #60a5fa;
  background: rgba(59,130,246,0.10);
}
.btn-replay {
  margin-left: auto;
  border-color: #1e3050;
  color: #3a5870;
  font-size: 0.75rem;
  padding: 6px 12px;
}
.btn-replay:hover { border-color: #3b82f6; color: #60a5fa; }

/* ── Main viz ── */
.viz-wrap {
  background: #070b1c;
  border: 1px solid #131c35;
  border-radius: 16px;
  padding: 18px 22px 14px;
  margin-bottom: 14px;
  overflow: hidden;
}

svg { display: block; width: 100%; max-width: 960px; margin: 0 auto; }

/* ── Description ── */
.desc {
  background: #070b1c;
  border: 1px solid #131c35;
  border-radius: 12px;
  padding: 16px 20px;
  font-size: 0.83rem;
  line-height: 1.75;
  color: #4a6880;
  min-height: 72px;
  transition: opacity 0.25s ease;
}
.desc strong { color: #93c5fd; font-weight: 600; }
.tag {
  display: inline-block;
  padding: 1px 7px;
  border-radius: 4px;
  font-size: 0.75rem;
  font-family: 'SF Mono', 'Fira Mono', monospace;
  margin: 0 2px;
}
.tg { background: rgba(16,185,129,.15); color: #34d399; }
.tb { background: rgba(59,130,246,.15); color: #60a5fa; }
.to { background: rgba(245,158,11,.15); color: #fbbf24; }
.tr { background: rgba(239,68,68,.15); color: #f87171; }
.tp { background: rgba(139,92,246,.15); color: #c4b5fd; }

/* ── Legend ── */
.legend {
  display: flex;
  gap: 18px;
  margin-top: 12px;
  flex-wrap: wrap;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.74rem;
  color: #3a5070;
}
.legend-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  flex-shrink: 0;
}
</style>
</head>

<div class="desc" id="desc">
  <strong>① 正常周期</strong> — cron 触发后，<span class="tag tb">OUTER.sh</span> 确认 state.yaml = idle、写 LOCK，
  tmux 中启动 <span class="tag tp">INNER.sh</span>。INNER 建立心跳，创建隔离
  <span class="tag tb">worktree</span>（分支 loop/cycle-…），claude 在沙盒中工作并提交，
  最后 gh PR 推送到 <span class="tag tg">origin/main</span>，worktree 与分支清理完毕。
</div>

<script>
// ──────────────────────────────────────────────
// ENGINE
// ──────────────────────────────────────────────
const PL = document.getElementById('particles');
let timers = [], rafs = [], stopped = false;

function reset() {
  stopped = true;
  timers.forEach(clearTimeout); timers = [];
  rafs.forEach(cancelAnimationFrame); rafs = [];
  PL.innerHTML = '';
  stopped = false;

  const glows = ['G_cron','G_outer','G_inner','G_claude','G_origin','G_alert','G_wt'];
  glows.forEach(id => { const e=document.getElementById(id); if(e){ e.setAttribute('opacity','0'); } });

  setTxt('state_val', 'status: idle', '#161b40');
  setTxt('HB_txt', '♥ 60 s HB', '#3a2878');
  document.getElementById('HB_pill').querySelector('rect').setAttribute('stroke','#1e1545');
  setTxt('LOCK_txt', '🔒 LOCK', '#2a4878');
  document.getElementById('LOCK_pill').querySelector('rect').setAttribute('fill','#0b1830');
  document.getElementById('LOCK_pill').querySelector('rect').setAttribute('stroke','#18304a');

  const bars = ['bar1','bar2','bar3','bar4','bar5'];
  const fills = ['#0a2015','#0a2015','#0a2015','#0a2015','#0a2015'];
  bars.forEach((id,i) => { const e=document.getElementById(id); if(e) e.setAttribute('fill',fills[i]); });
  document.getElementById('work_dot').setAttribute('opacity','0');

  document.getElementById('G_wt').setAttribute('stroke','#18304a');
  document.getElementById('G_wt').setAttribute('stroke-dasharray','9,4');
  document.getElementById('G_wt').setAttribute('opacity','0');

  document.getElementById('banner').setAttribute('opacity','0');
}

function wait(ms) {
  if (stopped) return Promise.resolve();
  return new Promise(res => {
    const t = setTimeout(res, ms);
    timers.push(t);
  });
}

function glow(id, color='#3b82f6', alpha='0.55') {
  const e = document.getElementById(id);
  if (!e) return;
  e.setAttribute('stroke', color);
  e.setAttribute('opacity', alpha);
}
function unglow(id) {
  const e = document.getElementById(id);
  if (e) e.setAttribute('opacity','0');
}
function setTxt(id, txt, color) {
  const e = document.getElementById(id);
  if (!e) return;
  if (txt  !== undefined) e.textContent = txt;
  if (color !== undefined) e.setAttribute('fill', color);
}

function particle(pathId, color, dur=700, r=5) {
  if (stopped) return;
  const path = document.getElementById(pathId);
  if (!path) return;
  const len = path.getTotalLength();
  const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
  c.setAttribute('r', r);
  c.setAttribute('fill', color);
  PL.appendChild(c);

  const t0 = performance.now();
  let rafId;
  function frame(now) {
    if (stopped) { c.remove(); return; }
    const p = Math.min((now - t0) / dur, 1);
    const ease = p < .5 ? 2*p*p : -1+(4-2*p)*p;
    const pt = path.getPointAtLength(len * ease);
    c.setAttribute('cx', pt.x);
    c.setAttribute('cy', pt.y);
    const alpha = p < .12 ? p/.12 : p > .88 ? (1-p)/.12 : 1;
    c.setAttribute('opacity', (alpha * 0.92).toFixed(2));
    if (p < 1) { rafId = requestAnimationFrame(frame); rafs.push(rafId); }
    else c.remove();
  }
  rafId = requestAnimationFrame(frame);
  rafs.push(rafId);
}

function stream(pathId, color, total=1000, interval=280, r=5) {
  let elapsed = 0;
  const fire = () => {
    if (stopped || elapsed >= total) return;
    particle(pathId, color, Math.min(750, total - elapsed), r);
    elapsed += interval;
    const t = setTimeout(fire, interval);
    timers.push(t);
  };
  fire();
}

function banner(txt, color='#10b981') {
  const e = document.getElementById('banner');
  const t = document.getElementById('banner_txt');
  e.querySelector('rect').setAttribute('stroke', color);
  t.textContent = txt;
  t.setAttribute('fill', color);
  e.setAttribute('opacity','1');
}

function claudeActive() {
  const cols = ['#1a5535','#124028','#163a2a','#0f3020','#143325'];
  ['bar1','bar2','bar3','bar4','bar5'].forEach((id,i) => {
    const e = document.getElementById(id);
    if (e) e.setAttribute('fill', cols[i]);
  });
  document.getElementById('work_dot').setAttribute('opacity','1');
}

function animateClock() {
  const h = document.getElementById('cron_h');
  const m = document.getElementById('cron_m');
  let deg = 0;
  const tick = () => {
    if (stopped) return;
    deg += 6;
    const rad = (deg - 90) * Math.PI / 180;
    const mrad = (deg * 6 - 90) * Math.PI / 180;
    h.setAttribute('x2', (130 + 12 * Math.cos(rad)).toFixed(1));
    h.setAttribute('y2', (55  + 12 * Math.sin(rad)).toFixed(1));
    m.setAttribute('x2', (130 + 16 * Math.cos(mrad)).toFixed(1));
    m.setAttribute('y2', (55  + 16 * Math.sin(mrad)).toFixed(1));
    const t = setTimeout(tick, 100);
    timers.push(t);
  };
  tick();
}

// WIRING
// ──────────────────────────────────────────────
let currentScenario = 'normal';
let currentBtn = null;

function pick(name, btn) {
  currentScenario = name;
  document.querySelectorAll('.btn:not(.btn-replay)').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentBtn = btn;
  run(name);
}

function replay() {
  if (currentBtn) run(currentScenario);
}

function run(name) {
  reset();
  const desc = document.getElementById('desc');
  desc.style.opacity = '0.3';
  const t1 = setTimeout(() => {
    desc.innerHTML = DESCS[name] || '';
    desc.style.opacity = '1';
  }, 220);
  timers.push(t1);
  const t2 = setTimeout(() => {
    if (SCENARIOS[name]) SCENARIOS[name]();
  }, 350);
  timers.push(t2);
}

// Start
window.addEventListener('load', () => {
  currentBtn = document.querySelector('.btn.active');
  run('normal');
});
