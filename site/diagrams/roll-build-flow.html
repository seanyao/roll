<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>roll-build Skill 信息图</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --panel: #ffffff;
      --text: #122033;
      --muted: #526070;
      --line: #d6dde8;
      --accent: #2563eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    header {
      padding: 28px 32px 18px;
      background: #ffffff;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 2;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(26px, 4vw, 42px);
      line-height: 1.1;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
    }

    main {
      padding: 24px;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .toolbar a {
      display: inline-flex;
      align-items: center;
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      font-weight: 700;
      text-decoration: none;
    }

    .toolbar a.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
    }

    .viewer {
      width: 100%;
      min-height: 70vh;
      overflow: auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
    }

    .viewer img {
      display: block;
      width: min(1920px, 100%);
      height: auto;
      margin: 0 auto;
    }

    @media (max-width: 720px) {
      header {
        position: static;
        padding: 22px 18px 16px;
      }

      main {
        padding: 14px;
      }

      .viewer img {
        width: 1400px;
        max-width: none;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>roll-build Skill 信息图</h1>
    <p>基于 roll-build skill 约束生成：输入路由、Story/Fly 模式、共享 TCR 流水线、验收证据与完成回写。</p>
  </header>
  <main>
    <nav class="toolbar" aria-label="流程图操作">
      <a class="primary" href="./roll-build-flow.svg" target="_blank" rel="noreferrer">打开 SVG</a>
      <a href="./roll-build-flow.svg" download>下载 SVG</a>
    </nav>
    <section class="viewer" aria-label="roll-build workflow diagram">
      <img src="./roll-build-flow.svg" alt="roll-build skill workflow flowchart">
    </section>
  </main>
</body>
</html>
