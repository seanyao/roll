# Agent routing config — schema v3 (US-AGENT-020 / US-AGENT-028)
#
# 极简四槽复杂度路由：任务按 est_min 归到 easy/default/hard 一档,每档绑一个
# 本机已装 agent；model 用 agent 默认。选中的 agent 跑不起来时,机械顶上
# fallback 槽。改路由直接改这个文件 + roll agent set / use,下轮 cycle 生效。
#
#   easy     ≤8 min 的小故事
#   default  8<x≤20 min,或评不出 estimate 的兜底
#   hard     >20 min 的大故事 / 高风险架构
#   fallback 主 agent 不可用(断网/断 token/没装/卡死)时机械顶上

schema: v3

easy:     { agent: pi }
default:  { agent: claude }
hard:     { agent: claude }
fallback: { agent: pi }
