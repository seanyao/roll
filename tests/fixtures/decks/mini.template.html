<!doctype html>
<html>
<head><title>{{title_en}} / {{title_zh}}</title></head>
<body>
<h1>{{title_en}}</h1>
<p>slug: {{slug}} | total: {{total_slides}}</p>
{{^empty}}<p>non-empty section renders</p>{{/empty}}
{{#slides}}
<section data-slide="{{number}}">
  <h2>{{title_en}}</h2>
  <h2 lang="zh">{{title_zh}}</h2>
  <div class="body-en">{{{body_en_html}}}</div>
  <div class="body-zh">{{{body_zh_html}}}</div>
</section>
{{/slides}}
</body>
</html>
