name: Deploy

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]

env:
  NODE_ENV: production
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  DEPLOY_URL: https://my-app.vercel.app

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npm test

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm run build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel
        run: npx vercel deploy --prod --token "$VERCEL_TOKEN"
        env:
          PRODUCTION_URL: https://my-app.vercel.app
